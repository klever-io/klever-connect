name: Version Packages

# Manual workflow to version packages based on changesets
# Creates a PR with version bumps instead of pushing directly to develop
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    name: Version Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for Changesets
        id: check-changesets
        run: |
          if [ -z "$(find .changeset -name '*.md' ! -name 'README.md' -type f)" ]; then
            echo "has_changesets=false" >> $GITHUB_OUTPUT
            echo "⚠️ No changeset files found in .changeset/ directory"
          else
            echo "has_changesets=true" >> $GITHUB_OUTPUT
            echo "✅ Found changeset files:"
            find .changeset -name '*.md' ! -name 'README.md' -type f -exec basename {} \;
          fi

      - name: Version Packages
        if: steps.check-changesets.outputs.has_changesets == 'true'
        run: pnpm run version

      - name: Build Packages
        if: steps.check-changesets.outputs.has_changesets == 'true'
        run: pnpm build

      - name: Run Tests
        if: steps.check-changesets.outputs.has_changesets == 'true'
        run: pnpm test

      - name: Create Version PR
        if: steps.check-changesets.outputs.has_changesets == 'true'
        run: |
          BRANCH="chore/version-packages-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "chore: version packages"
          git push origin "$BRANCH"

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore: version packages" \
            --body "## Summary

          Automated version bump from changesets.

          - Updated package.json versions
          - Generated/updated CHANGELOG.md files
          - Deleted consumed changeset files

          ## Next Steps

          1. Merge this PR to develop (squash is fine)
          2. Create release PR from develop → master
          3. Merge release PR (regular merge, no squash)
          4. Trigger Publish Packages workflow on master"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Summary
        run: |
          echo "## 📦 Version Packages Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-changesets.outputs.has_changesets }}" == "true" ]; then
            echo "✅ Version PR created successfully!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📋 Changes" >> $GITHUB_STEP_SUMMARY
            echo "- Updated package.json versions" >> $GITHUB_STEP_SUMMARY
            echo "- Generated/updated CHANGELOG.md files" >> $GITHUB_STEP_SUMMARY
            echo "- Deleted consumed changeset files" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🚀 Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "1. Merge the version PR to develop" >> $GITHUB_STEP_SUMMARY
            echo "2. Create release PR from develop to master" >> $GITHUB_STEP_SUMMARY
            echo "3. Trigger the 'Publish Packages' workflow from master branch" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No changesets found - nothing to version" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Make sure changesets are created with PRs using:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "pnpm changeset" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
